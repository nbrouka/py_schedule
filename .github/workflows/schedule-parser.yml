name: Schedule Parser

on:
  # Run nightly at 2:00 AM UTC (5:00 AM Minsk time)
  schedule:
    - cron: '0 2 * * *'
  # Allow manual trigger
  workflow_dispatch:
  # Run on push to main branch
  push:
    branches:
      - main

env:
  python-version: '3.11'

jobs:
  parse-schedule:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.python-version }}
          cache: 'pip'
      
      - name: Install LibreOffice
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run parser
        env:
          FOLDER_ID: ${{ secrets.FOLDER_ID }}
          TARGET_TEACHER: ${{ secrets.TARGET_TEACHER }}
        run: |
          python parser.py
      
      - name: Check for changes
        id: changes
        run: |
          echo "Checking schedule.json changes..."
          
          # Check if schedule.json exists in HEAD (previous commit)
          if git show HEAD:schedule.json > /dev/null 2>&1; then
            echo "schedule.json exists in HEAD, comparing..."
            git diff HEAD -- schedule.json > /tmp/schedule_diff.txt
            if [ -s /tmp/schedule_diff.txt ]; then
              echo "Changes detected in schedule.json!"
              cat /tmp/schedule_diff.txt
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "No changes in schedule.json (same as HEAD)"
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "schedule.json doesn't exist in HEAD - checking if it's a new file..."
            if [ -f schedule.json ]; then
              echo "schedule.json exists locally but not in HEAD - NEW FILE!"
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "schedule.json not found locally either"
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          fi
      
      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Add schedule.json changes
          git add schedule.json
          
          # Commit changes
          git commit -m "Update schedule.json - $(date '+%Y-%m-%d %H:%M')" || exit 0
          
          # Use token with write access
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }} HEAD:main
        
      - name: No changes detected
        if: steps.changes.outputs.changed == 'false'
        run: echo "No schedule changes detected"
